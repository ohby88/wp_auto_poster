name: WordPress Auto Poster

on:
  schedule:
    # 매일 UTC 기준 00:00 (한국 시간 오전 9시)에 실행
    - cron: '0 0 * * *'
  # GitHub 저장소 액션 탭에서 수동으로 실행 가능토록 허용
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 소스코드 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: Python 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 패키지 다운로드 속도 향상을 위한 캐싱

    - name: 필수 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 자동 포스팅 스크립트 실행
      env:
        # Settings 탭 -> Secrets and variables -> Actions 에서 환경 변수 세팅 필요
        WP_URL: ${{ secrets.WP_URL }}
        WP_USER: ${{ secrets.WP_USER }}
        WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        KEYWORDS: ${{ secrets.KEYWORDS }}
        POST_STATUS: 'publish' # 자동화에서는 글을 바로 공개 발행함. 임시저장을 원하면 'draft'로 설정
      run: |
        python main.py
